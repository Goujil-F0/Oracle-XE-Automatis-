version: "3.8"

services:
  oracle-db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-plsql
    environment:
      ORACLE_PASSWORD=${ORACLE_PASSWORD}
      APP_USER=${APP_USER}
      APP_USER_PASSWORD=${APP_USER_PASSWORD}
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./logs:/opt/oracle/logs
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/admin@//localhost:1521/XEPDB1 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  oracle_data:
    driver: local